<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website With Bro Code</title>
    <!--Here we are linking the css file-->
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <h1 id = "MyH1">Welcome</h1>
    <p id = "MyP"></p>

    <!--This is a label for the textbox-->
    <label>Username: </label>

    <!---This is a textbox to accept user input.-->
    <input type="text", id = "mytext"><br><br>

    <!--This now is a clickable button.-->
    <button id = "MySubmit">Submit</button><br/>

<!--Creating a radio button and a checkbox for user input-->
    <input type = "radio" id = "MyRadioButton">
    <label for = "MyRadioButton" >This is a radio button</label><br/>

    <!--Checkbox-->
    <input type = "checkbox" id = "checkbox">
    <label for = "checkbox">This is a checkbox</label>

    <!--Input with a scroll bar for the user to choose a number with 1 as a default value.-->
    <input type = "number" value = "1">

    <!--Linking the js file here.-->
    <script src = "index.js"></script>
</body>
</html>
